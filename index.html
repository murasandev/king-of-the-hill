<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="styles.css">
  <script src="javascript.js" defer></script>
</head>
<body>
  <div class="page-container">
    <div class="top-container">
      <h1>Rock Paper ScIssors!</h1>
    </div>

    <div class="mid-container">
      <div class="user-score-container">
        <div class="user-score-title"> User Score:</div>
        <div class="user-score">00</div>
      </div>
      <div class="round-image-text-container">
        <div class="round-text-container"></div>
        <div class="image-container"></div>
        <div class="game-text-container">Select Rock, Paper, or Scissor to start!</div>
      </div>
      <div class="cpu-score-container">
        <div class="cpu-score-title">CPU Score:</div>
        <div class="cpu-score">00</div>
      </div>
    </div>

    <div id="btn-container">
      <div class="btn-rock"><img src="images/rock.png" alt="rock"></div>
      <div class="btn-paper"><img src="images/paper.png" alt="paper"></div>
      <div class="btn-scissor"><img src="images/scissor.png" alt="scissor"></div>
      <div class="play-again-container">
        <div class="play-again-text">Play Again?</div>
        <div class="btn-play-again">Yes</div>
      </div>
    </div> 
  </div>
  <audio class="btn-audio" src="sounds/game-start.mp3"></audio>
</body>
</html>

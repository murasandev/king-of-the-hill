<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="styles.css">
  <script src="javascript.js" defer></script>
</head>
<body>
  <div class="page-container">
    <div class="top-container">
      <h1>Rock Paper Scissors!</h1>
    </div>

    <div class="mid-container">
      <div class="round-score-container">
        <div class="round-text-container"></div>
        <div class="score-container">
          <div class="user-score"></div>
          <div class="cpu-score"></div>
        </div>
      </div>
      <div class="image-container"></div>
      <div class="game-text-container"></div>
    </div>

    <div id="btn-container">
      <div class="btn-rock"><img src="images/rock.png" alt="rock"></div>
      <div class="btn-paper"><img src="images/paper.png" alt="paper"></div>
      <div class="btn-scissor"><img src="images/scissor.png" alt="scissor"></div>
    </div> 
  </div>
  
</body>
</html>
